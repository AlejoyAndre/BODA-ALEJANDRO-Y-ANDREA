<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda - Invitación Digital</title>
    <style>
        /* Tipografías y Estilos Globales */
        @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f1ea; 
            color: #4a4a4a;
            line-height: 1.6;
            text-align: center;
            overflow-x: hidden;
        }

        /* PANTALLA DE BIENVENIDA */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f4f1ea;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .welcome-content {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
        }

        .welcome-title {
            font-family: 'Alex Brush', cursive;
            font-size: 42px;
            color: #1e3f20; /* Verde Oscuro */
            margin-bottom: 5px;
        }

        .welcome-text {
            font-size: 14px;
            color: #777777;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* CONTENEDOR PRINCIPAL DE LA WEB */
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            padding-bottom: 60px;
            position: relative;
        }

        /* Reproductor de Música Flotante */
        .music-player {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #1e3f20; /* Verde Oscuro */
            transition: transform 0.3s ease;
        }

        .music-icon {
            font-size: 20px;
            color: #1e3f20; /* Verde Oscuro */
        }

        /* Hero / Portada */
        .hero {
            padding: 60px 20px 20px 20px;
            background: linear-gradient(rgba(244, 241, 234, 0.4), rgba(255, 255, 255, 1));
        }

        h1 {
            font-family: 'Alex Brush', cursive;
            font-size: 48px;
            color: #1e3f20; /* Verde Oscuro */
            margin-bottom: 10px;
            font-weight: 400;
        }

        .subtitle {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8e8e8e;
            margin-bottom: 20px;
        }

        /* Contenedor de Imágenes */
        .invitation-image-container {
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .invitation-img {
            width: 100%;
            display: block;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }

        /* Secciones de Información */
        .section {
            padding: 40px 30px;
            border-top: 1px solid #f4f1ea;
        }

        .section-title {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #1e3f20; /* Verde Oscuro */
            margin-bottom: 20px;
            font-weight: 600;
        }

        p {
            font-size: 14px;
            color: #666666;
            margin-bottom: 15px;
        }

        /* Botones Interactivos */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 280px;
            padding: 14px 20px;
            margin: 8px 0;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: none
